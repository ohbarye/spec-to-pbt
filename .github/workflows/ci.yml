name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        ruby-version: ['4.0']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Run tests
        run: bundle exec rspec

      - name: Type check
        run: |
          bundle exec rbs-inline --output sig/generated lib/
          bundle exec steep check

      - name: Test CLI
        run: |
          bundle exec bin/alloy_to_pbt spec/fixtures/alloy/sort.als -o generated
          bundle exec bin/alloy_to_pbt spec/fixtures/alloy/stack.als -o generated
          ls -la generated/

      - name: Run example PBT
        run: bundle exec rspec example/generated/sort_pbt.rb example/generated/stack_pbt.rb
